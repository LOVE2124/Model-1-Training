<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OJT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
  <div class="container mt-4">

    <!-- Headings Row -->
    <div class="row mb-3">
      <div class="col-12 bg-primary text-white p-3">
        <h1>OJT</h1>
        <h2>On the Job Training</h2>
      </div>
    </div>

    <!-- Sub Headings Row -->
    <div class="row mb-3">
      <div class="col-md-4 bg-secondary text-white p-3">
        <h3>1. Training Program</h3>
      </div>
      <div class="col-md-4 bg-info p-3">
        <h4>SOU</h4>
      </div>
      <div class="col-md-4 bg-warning p-3">
        <h5>Training Program</h5>
        <h6>Sixth Heading</h6>
      </div>
    </div>

    <!-- Text Formatting Row -->
    <div class="row mb-3">
      <div class="col-md-4 bg-light p-3">
        <b>Training Program</b>
      </div>
      <div class="col-md-4 bg-light p-3">
        <i>Training Program</i>
      </div>
      <div class="col-md-4 bg-light p-3">
        <u>Training Program</u>
      </div>
    </div>

    <!-- Paragraph & Lists Row -->
    <div class="row">
      <div class="col-md-4 bg-light p-3">
        <p>p-Tag : Training Program</p>
        <hr>
      </div>
      <div class="col-md-4 bg-light p-3">
        <ol>
          <li>Training Program</li>
          <li>Training Program</li>
          <li>Training Program</li>
        </ol>
      </div>
      <div class="col-md-4 bg-light p-3">
        <ul>
          <li>Training Program</li>
          <li>Training Program</li>
          <li>Training Program</li>
        </ul>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
