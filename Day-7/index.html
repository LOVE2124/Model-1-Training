<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
  <div class="container mt-4">

    <!-- 1 Column -->
    <div class="row mb-3">
      <div class="col bg-primary text-white p-3">Full Width</div>
    </div>

    <!-- 2 Columns -->
    <div class="row mb-3">
      <div class="col-6 bg-success text-white p-3">Col 1</div>
      <div class="col-6 bg-warning p-3">Col 2</div>
    </div>

    <!-- 3 Columns -->
    <div class="row mb-3">
      <div class="col-4 bg-danger text-white p-3">Col 1</div>
      <div class="col-4 bg-info p-3">Col 2</div>
      <div class="col-4 bg-secondary text-white p-3">Col 3</div>
    </div>

    <!-- Responsive Columns -->
    <div class="row">
      <div class="col-12 col-md-6 col-lg-3 bg-dark text-white p-3 mb-2">Box 1</div>
      <div class="col-12 col-md-6 col-lg-3 bg-dark text-white p-3 mb-2">Box 2</div>
      <div class="col-12 col-md-6 col-lg-3 bg-dark text-white p-3 mb-2">Box 3</div>
      <div class="col-12 col-md-6 col-lg-3 bg-dark text-white p-3 mb-2">Box 4</div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
