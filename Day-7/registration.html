<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <div class="card shadow">
          <div class="card-header bg-primary text-white text-center">
            <h4>Registration Form</h4>
          </div>
          <div class="card-body">
            <form>

              <!-- Name Row -->
              <div class="row mb-3">
                <div class="col-6">
                  <label class="form-label">First Name</label>
                  <input type="text" class="form-control" placeholder="First Name">
                </div>
                <div class="col-6">
                  <label class="form-label">Last Name</label>
                  <input type="text" class="form-control" placeholder="Last Name">
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="example@email.com">
              </div>

              <!-- Password Row -->
              <div class="row mb-3">
                <div class="col-6">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control" placeholder="Password">
                </div>
                <div class="col-6">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" class="form-control" placeholder="Confirm Password">
                </div>
              </div>

              <!-- Phone & DOB Row -->
              <div class="row mb-3">
                <div class="col-6">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-control" placeholder="Phone Number">
                </div>
                <div class="col-6">
                  <label class="form-label">Date of Birth</label>
                  <input type="date" class="form-control">
                </div>
              </div>

              <!-- Gender -->
              <div class="mb-3">
                <label class="form-label">Gender</label>
                <div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" value="male">
                    <label class="form-check-label">Male</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" value="female">
                    <label class="form-check-label">Female</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" value="other">
                    <label class="form-check-label">Other</label>
                  </div>
                </div>
              </div>

              <!-- Address -->
              <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="2" placeholder="Enter your address"></textarea>
              </div>

              <!-- Terms -->
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input">
                <label class="form-check-label">I agree to the Terms and Conditions</label>
              </div>

              <!-- Buttons -->
              <div class="row">
                <div class="col-6">
                  <button type="submit" class="btn btn-primary w-100">Register</button>
                </div>
                <div class="col-6">
                  <button type="reset" class="btn btn-outline-secondary w-100">Reset</button>
                </div>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
